<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <link rel="canonical" href="https://taaheer.com/">
    <meta http-equiv="refresh" content="0; url=https://taaheer.com/">
    
<script>
  // Takes the current path (e.g., /blog/post-1) and appends it to the new domain
  var newDomain = "https://taaheer.com";
  window.location.href = newDomain + window.location.pathname + window.location.search;
</script>
  </head>
  <body>
    <p>This page has moved. If you are not redirected, <a href="https://taaheer.com/">click here</a>.</p>
  </body>
</html>
